<!DOCTYPE html>
<html>
<head>
  <title>Signup</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

<div class="auth-container">

  <!-- LEFT -->
  <div class="auth-left">
    <h1>Create Account</h1>
    <p>Join and start managing your tasks</p>
  </div>

  <!-- RIGHT -->
  <div class="auth-right">

    <div class="auth-box">
      <h2>Signup</h2>

      <input id="signupUser" placeholder="Username">

      <div class="input-box">
        <input id="signupPass" type="password" placeholder="Password">
        <span onclick="togglePassword('signupPass', this)">👁️</span>
      </div>

      <div id="strength"></div>

      <div class="input-box">
        <input id="confirmPass" type="password" placeholder="Confirm Password">
        <span onclick="togglePassword('confirmPass', this)">👁️</span>
      </div>

      <p id="error" class="error"></p>

      <button onclick="signup()">Signup</button>

      <p>Already have account? <a href="index.html">Login</a></p>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
